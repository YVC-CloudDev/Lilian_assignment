name: Deploy to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1
      - name: Deploy to S3
        # כאן תכתבי את שם הבאקט שלך במקום YOUR-BUCKET-NAME
        run: aws s3 sync . s3://lilian-static-website-2026 --delete --exclude ".git*" --exclude ".github*"
